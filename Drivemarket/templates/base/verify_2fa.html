{% extends "base.html" %}
{% block title %}Verificación en 2 Pasos - Drive Market{% endblock %}

{% block head %}
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f4f5; }
    .auth-container {
        max-width: 440px;
        margin: 80px auto;
        padding: 0 20px;
    }
    .auth-card {
        background: #fff;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1);
        text-align: center;
    }
    .auth-icon-wrap {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        background: rgba(255,106,0,0.1);
        color: #FF6A00;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        margin: 0 auto 20px;
    }
    .auth-title {
        font-size: 1.5rem;
        font-weight: 800;
        color: #09090b;
        margin-bottom: 8px;
    }
    .auth-subtitle {
        color: #71717a;
        font-size: 0.95rem;
        line-height: 1.5;
        margin-bottom: 30px;
    }
    .auth-subtitle strong { color: #09090b; }
    
    .otp-inputGroup {
        position: relative;
        margin-bottom: 24px;
    }
    .otp-input {
        width: 100%;
        font-family: monospace;
        letter-spacing: 12px;
        font-size: 2rem;
        font-weight: 800;
        text-align: center;
        padding: 15px;
        border: 2px solid #e4e4e7;
        border-radius: 12px;
        color: #09090b;
        transition: all 0.3s ease;
        background: #fafafa;
    }
    .otp-input:focus {
        outline: none;
        border-color: #FF6A00;
        background: #fff;
        box-shadow: 0 0 0 4px rgba(255,106,0,0.1);
    }
    .btn-verify {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        background: linear-gradient(135deg, #FF6A00, #E64E00);
        color: white;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 6px 15px rgba(255,106,0,0.25);
    }
    .btn-verify:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(255,106,0,0.3);
    }
    .auth-footer {
        margin-top: 24px;
        font-size: 0.85rem;
        color: #71717a;
    }
    .auth-link {
        color: #FF6A00;
        text-decoration: none;
        font-weight: 700;
    }
    .flash-messages {
        margin-bottom: 20px;
        text-align: left;
    }
    .flash-message {
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .flash-error { background: rgba(239,68,68,0.1); color: #dc2626; border-left: 3px solid #ef4444; }
    .flash-info { background: rgba(59,130,246,0.1); color: #2563eb; border-left: 3px solid #3b82f6; }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-icon-wrap">
            <i class='bx bx-check-shield'></i>
        </div>
        <h1 class="auth-title">Verificación 2FA</h1>
        <p class="auth-subtitle">Ingresa el código de 6 dígitos que enviamos al correo <strong>{{ email }}</strong></p>

        <div class="flash-messages">

        </div>

        <form method="POST" action="{{ url_for('verify_2fa') }}">
            <div class="otp-inputGroup">
                <!-- Autocomplete "one-time-code" permite a los móviles sugerir el código recibido por SMS/Mail -->
                <input type="text" name="codigo_2fa" class="otp-input" maxlength="6" pattern="[0-9]{6}" autocomplete="one-time-code" placeholder="------" required autofocus>
            </div>
            <button type="submit" class="btn-verify">Verificar y Entrar</button>
        </form>

        <div class="auth-footer">
            ¿No recibiste el código? <br><br>
            <a href="{{ url_for('login') }}" class="auth-link">Volver al login</a>
        </div>
    </div>
</div>

<script>
// Solo permitir números en el input
document.querySelector('.otp-input').addEventListener('input', function(e) {
    this.value = this.value.replace(/[^0-9]/g, '');
});
</script>
{% endblock %}

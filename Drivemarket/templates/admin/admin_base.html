<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %} | Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { display: flex; }

        /* SIDEBAR */
        .sidebar {
            width: 250px;
            background: #222;
            height: 100vh;
            color: white;
            padding: 20px 15px;
            position: fixed;
        }
        .sidebar a {
            display: block;
            padding: 12px;
            color: #ddd;
            text-decoration: none;
            margin-bottom: 6px;
            border-radius: 5px;
        }
        .sidebar a:hover {
            background: #444;
            color: #fff;
        }

        /* CONTENT */
        .content {
            margin-left: 260px;
            width: 100%;
            padding: 20px;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h3 class="mb-4"><i class="fas fa-tools"></i> Admin Panel</h3>

        <a href="{{ url_for('admin_dashboard') }}"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="{{ url_for('admin_usuarios') }}"><i class="fas fa-users"></i> Usuarios</a>
        <a href="{{ url_for('admin_vehiculos') }}"><i class="fas fa-car"></i> Vehículos</a>
        <a href="{{ url_for('admin_reportes') }}"><i class="fas fa-flag"></i> Reportes</a>
        <a href="{{ url_for('index') }}"><i class="fas fa-home"></i> Volver al sitio</a>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>
    
</body>
</html>
